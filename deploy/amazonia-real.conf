# AMAZONIA REAL · Apache vhost · EC2 IBD :8479
# Public, no auth (controlled access analytics via JS beacon + PHP log)

Listen 8479 https

<VirtualHost *:8479>
    ServerName brasildesenhado.org.br
    DocumentRoot "/home/ec2-user/amazonia-real/app"

    <Directory "/home/ec2-user/amazonia-real/app">
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
        DirectoryIndex index.html
    </Directory>

    # API path needs PHP
    <Directory "/home/ec2-user/amazonia-real/app/api">
        AllowOverride All
        Require all granted
        Options -Indexes
        AddType application/x-httpd-php .php
    </Directory>

    # Block sensitive files
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>
    <FilesMatch "(\.env|\.sql|\.bak|~)$">
        Require all denied
    </FilesMatch>

    # Blocklist map (consistent with other IBD apps)
    Include conf.d/blocklist-ips.map 2>/dev/null
    <RequireAll>
        Require all granted
        Require not env BLOCKED_IP
    </RequireAll>

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/ibd.org.br/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/ibd.org.br/privkey.pem

    # Logs
    ErrorLog  logs/amazonia-real_error.log
    CustomLog logs/amazonia-real_access.log combined

    # Cache static
    <FilesMatch "\.(jpg|jpeg|png|gif|webp|css|js|woff2)$">
        Header set Cache-Control "public, max-age=86400"
    </FilesMatch>

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</VirtualHost>
