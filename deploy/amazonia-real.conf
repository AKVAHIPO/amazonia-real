# AMAZONIA REAL · Apache vhost · :8479
# Public, no auth (controlled access analytics via JS beacon + PHP log)
# Hardened: 2026-04-26 (CSP local, Permissions-Policy, COOP/CORP, deny patterns)

Listen 8479 https

<VirtualHost *:8479>
    ServerName brasildesenhado.org.br
    DocumentRoot "/home/ec2-user/amazonia-real/app"

    <Directory "/home/ec2-user/amazonia-real/app">
        AllowOverride None
        Require all granted
        Options -Indexes +FollowSymLinks
        DirectoryIndex index.html
    </Directory>

    # API path: PHP enabled, no caching
    <Directory "/home/ec2-user/amazonia-real/app/api">
        AllowOverride None
        Require all granted
        Options -Indexes
        AddType application/x-httpd-php .php
    </Directory>

    # ==========================================================
    # DENY PATTERNS (defense in depth — these files should never
    # be inside DocumentRoot anyway, but block by name as well)
    # ==========================================================
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>
    <FilesMatch "\.(env|sql|bak|swp|swo|orig|old|tmp|log|conf|md|yml|yaml|json|sh|py|rb|ini|map)$">
        Require all denied
    </FilesMatch>
    <FilesMatch "~$">
        Require all denied
    </FilesMatch>
    # Block exposure of any nested .git/.svn/.hg directory contents
    <DirectoryMatch "/\.(git|svn|hg|bzr|idea|vscode)(/|$)">
        Require all denied
    </DirectoryMatch>
    # Re-allow .json on /api if needed in the future (right now we don't serve any)
    # (none required)

    # Allow PHP API responses (override deny for valid endpoints)
    <Files "log_access.php">
        Require all granted
    </Files>

    # ==========================================================
    # Blocklist (RewriteMap defined globally in blocklist.conf)
    # ==========================================================
    <Location "/">
        <RequireAll>
            Require all granted
            Require not env BLOCKED_IP
        </RequireAll>
    </Location>

    # ==========================================================
    # SSL
    # ==========================================================
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/ibd.org.br/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/ibd.org.br/privkey.pem

    # ==========================================================
    # Logs
    # ==========================================================
    ErrorLog  logs/amazonia-real_error.log
    CustomLog logs/amazonia-real_access.log combined

    # ==========================================================
    # Cache static (1 day for assets) · no-cache for HTML/PHP
    # ==========================================================
    <FilesMatch "\.(jpg|jpeg|png|gif|webp|css|js|woff2|ico)$">
        Header set Cache-Control "public, max-age=86400, immutable"
    </FilesMatch>
    <FilesMatch "\.(html?)$">
        Header set Cache-Control "no-cache, must-revalidate"
    </FilesMatch>
    # API never cached — and no logging of body content
    <Location "/api">
        Header set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
        Header set Pragma "no-cache"
        Header set Expires "0"
    </Location>

    # ==========================================================
    # SECURITY HEADERS — override any global defaults
    # CSP intentionally minimal: no third-party APIs, no Mapbox,
    # no OpenAI/Anthropic/Groq, no ip-api, no Supabase exposure.
    # Only chart.js from cdn.jsdelivr.net is allowed.
    # 'always' + 'unset' guarantees override of inherited headers.
    # ==========================================================
    Header always unset Content-Security-Policy
    Header always unset X-Powered-By
    Header always unset Server
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=(), browsing-topics=()"
    Header always set Cross-Origin-Opener-Policy "same-origin"
    Header always set Cross-Origin-Resource-Policy "same-origin"
    Header always set X-Robots-Tag "index, follow, noarchive, nosnippet"
    Header always set Content-Security-Policy "default-src 'none'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; form-action 'none'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; media-src 'none'; worker-src 'none'; manifest-src 'self'; upgrade-insecure-requests"
</VirtualHost>
